<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API de Apostas - Interface Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 24px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background-color: white;
            color: #667eea;
        }

        .tab-content {
            display: none;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        button {
            background-color: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-danger {
            background-color: #e74c3c;
            margin-top: 10px;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .data-list {
            margin-top: 30px;
        }

        .data-list h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .list-item {
            background-color: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item-content {
            flex: 1;
        }

        .list-item-content p {
            margin: 5px 0;
            color: #555;
        }

        .list-item-content strong {
            color: #333;
        }

        .list-item-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-edit {
            background-color: #3498db;
        }

        .btn-edit:hover {
            background-color: #2980b9;
        }

        .btn-delete {
            background-color: #e74c3c;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-online {
            background-color: #d4edda;
            color: #155724;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .tabs {
                gap: 5px;
            }

            .tab-btn {
                padding: 10px 15px;
                font-size: 0.9em;
            }

            .list-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .list-item-actions {
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🥊 API de Apostas em Lutas</h1>
            <p>Interface Web para Gerenciar Apostadores, Lutadores, Lutas e Apostas</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('apostadores')">Apostadores</button>
            <button class="tab-btn" onclick="switchTab('lutadores')">Lutadores</button>
            <button class="tab-btn" onclick="switchTab('lutas')">Lutas</button>
            <button class="tab-btn" onclick="switchTab('apostas')">Apostas</button>
            <button class="tab-btn" onclick="switchTab('status')">Status</button>
        </div>

        <!-- TAB: APOSTADORES -->
        <div id="apostadores" class="tab-content active">
            <h2>Gerenciar Apostadores</h2>
            <div id="msg-apostadores" class="message"></div>
            
            <form onsubmit="createApostador(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="ap-nome">Nome:</label>
                        <input type="text" id="ap-nome" required>
                    </div>
                    <div class="form-group">
                        <label for="ap-idade">Idade:</label>
                        <input type="number" id="ap-idade" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="ap-pix">Chave PIX:</label>
                    <input type="text" id="ap-pix" required>
                </div>
                <button type="submit">Criar Apostador</button>
            </form>

            <div class="data-list">
                <h3>Lista de Apostadores</h3>
                <div id="apostadores-list"></div>
            </div>
        </div>

        <!-- TAB: LUTADORES -->
        <div id="lutadores" class="tab-content">
            <h2>Gerenciar Lutadores</h2>
            <div id="msg-lutadores" class="message"></div>
            
            <form onsubmit="createLutador(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="lt-nome">Nome:</label>
                        <input type="text" id="lt-nome" required>
                    </div>
                    <div class="form-group">
                        <label for="lt-categoria">Categoria:</label>
                        <input type="text" id="lt-categoria" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="lt-apelido">Apelido:</label>
                        <input type="text" id="lt-apelido">
                    </div>
                    <div class="form-group">
                        <label for="lt-arte">Arte Marcial:</label>
                        <input type="text" id="lt-arte">
                    </div>
                </div>
                <button type="submit">Criar Lutador</button>
            </form>

            <div class="data-list">
                <h3>Lista de Lutadores</h3>
                <div id="lutadores-list"></div>
            </div>
        </div>

        <!-- TAB: LUTAS -->
        <div id="lutas" class="tab-content">
            <h2>Gerenciar Lutas</h2>
            <div id="msg-lutas" class="message"></div>
            
            <form onsubmit="createLuta(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="lu-data">Data:</label>
                        <input type="date" id="lu-data" required>
                    </div>
                    <div class="form-group">
                        <label for="lu-horario">Horário:</label>
                        <input type="time" id="lu-horario" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="lu-lutador1">Lutador 1 (ID):</label>
                        <input type="number" id="lu-lutador1" required>
                    </div>
                    <div class="form-group">
                        <label for="lu-lutador2">Lutador 2 (ID):</label>
                        <input type="number" id="lu-lutador2" required>
                    </div>
                </div>
                <button type="submit">Agendar Luta</button>
            </form>

            <div class="data-list">
                <h3>Lista de Lutas</h3>
                <div id="lutas-list"></div>
            </div>
        </div>

        <!-- TAB: APOSTAS -->
        <div id="apostas" class="tab-content">
            <h2>Gerenciar Apostas</h2>
            <div id="msg-apostas" class="message"></div>
            
            <form onsubmit="createAposta(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="ap-valor">Valor da Aposta (R$):</label>
                        <input type="number" id="ap-valor" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="ap-luta">ID da Luta:</label>
                        <input type="number" id="ap-luta" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="ap-lutador">ID do Lutador (Favorito):</label>
                        <input type="number" id="ap-lutador" required>
                    </div>
                    <div class="form-group">
                        <label for="ap-apostador">ID do Apostador:</label>
                        <input type="number" id="ap-apostador" required>
                    </div>
                </div>
                <button type="submit">Realizar Aposta</button>
            </form>

            <div class="data-list">
                <h3>Lista de Apostas</h3>
                <div id="apostas-list"></div>
            </div>
        </div>

        <!-- TAB: STATUS -->
        <div id="status" class="tab-content">
            <h2>Status da API</h2>
            <div id="status-content"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000';

        // Função para trocar de aba
        function switchTab(tabName) {
            // Esconde todas as abas
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Mostra a aba selecionada
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // Carrega dados ao abrir a aba
            if (tabName === 'apostadores') loadApostadores();
            if (tabName === 'lutadores') loadLutadores();
            if (tabName === 'lutas') loadLutas();
            if (tabName === 'apostas') loadApostas();
            if (tabName === 'status') loadStatus();
        }

        // Função para mostrar mensagens
        function showMessage(elementId, message, type) {
            const msgElement = document.getElementById(elementId);
            msgElement.textContent = message;
            msgElement.className = `message ${type}`;
            setTimeout(() => {
                msgElement.className = 'message';
            }, 5000);
        }

        // ===== APOSTADORES =====
        async function createApostador(e) {
            e.preventDefault();
            const data = {
                nome: document.getElementById('ap-nome').value,
                idade: parseInt(document.getElementById('ap-idade').value),
                chave_pix: document.getElementById('ap-pix').value
            };

            try {
                const response = await fetch(`${API_URL}/apostadores/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                showMessage('msg-apostadores', `✓ ${result.message}`, 'success');
                e.target.reset();
                loadApostadores();
            } catch (error) {
                showMessage('msg-apostadores', `✗ Erro: ${error.message}`, 'error');
            }
        }

        async function loadApostadores() {
            try {
                const response = await fetch(`${API_URL}/apostadores/`);
                const data = await response.json();
                const listDiv = document.getElementById('apostadores-list');
                
                if (data.length === 0) {
                    listDiv.innerHTML = '<p style="color: #999;">Nenhum apostador cadastrado</p>';
                    return;
                }

                listDiv.innerHTML = data.map(item => `
                    <div class="list-item">
                        <div class="list-item-content">
                            <p><strong>ID:</strong> ${item.id}</p>
                            <p><strong>Nome:</strong> ${item.nome}</p>
                            <p><strong>Idade:</strong> ${item.idade}</p>
                            <p><strong>PIX:</strong> ${item.chave_pix}</p>
                        </div>
                        <div class="list-item-actions">
                            <button class="btn-small btn-delete" onclick="deleteApostador(${item.id})">Deletar</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Erro ao carregar apostadores:', error);
            }
        }

        async function deleteApostador(id) {
            if (!confirm('Tem certeza que deseja deletar este apostador?')) return;
            try {
                await fetch(`${API_URL}/apostadores/${id}`, { method: 'DELETE' });
                showMessage('msg-apostadores', '✓ Apostador deletado com sucesso', 'success');
                loadApostadores();
            } catch (error) {
                showMessage('msg-apostadores', `✗ Erro: ${error.message}`, 'error');
            }
        }

        // ===== LUTADORES =====
        async function createLutador(e) {
            e.preventDefault();
            const data = {
                nome: document.getElementById('lt-nome').value,
                categoria: document.getElementById('lt-categoria').value,
                apelido: document.getElementById('lt-apelido').value || null,
                arte: document.getElementById('lt-arte').value || null
            };

            try {
                const response = await fetch(`${API_URL}/lutadores/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                showMessage('msg-lutadores', `✓ ${result.message}`, 'success');
                e.target.reset();
                loadLutadores();
            } catch (error) {
                showMessage('msg-lutadores', `✗ Erro: ${error.message}`, 'error');
            }
        }

        async function loadLutadores() {
            try {
                const response = await fetch(`${API_URL}/lutadores/`);
                const data = await response.json();
                const listDiv = document.getElementById('lutadores-list');
                
                if (data.length === 0) {
                    listDiv.innerHTML = '<p style="color: #999;">Nenhum lutador cadastrado</p>';
                    return;
                }

                listDiv.innerHTML = data.map(item => `
                    <div class="list-item">
                        <div class="list-item-content">
                            <p><strong>ID:</strong> ${item.id}</p>
                            <p><strong>Nome:</strong> ${item.nome}</p>
                            <p><strong>Categoria:</strong> ${item.categoria}</p>
                            <p><strong>Apelido:</strong> ${item.apelido || 'N/A'}</p>
                            <p><strong>Arte:</strong> ${item.arte || 'N/A'}</p>
                        </div>
                        <div class="list-item-actions">
                            <button class="btn-small btn-delete" onclick="deleteLutador(${item.id})">Deletar</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Erro ao carregar lutadores:', error);
            }
        }

        async function deleteLutador(id) {
            if (!confirm('Tem certeza que deseja deletar este lutador?')) return;
            try {
                await fetch(`${API_URL}/lutadores/${id}`, { method: 'DELETE' });
                showMessage('msg-lutadores', '✓ Lutador deletado com sucesso', 'success');
                loadLutadores();
            } catch (error) {
                showMessage('msg-lutadores', `✗ Erro: ${error.message}`, 'error');
            }
        }

        // ===== LUTAS =====
        async function createLuta(e) {
            e.preventDefault();
            const data = {
                horario: document.getElementById('lu-horario').value,
                data: document.getElementById('lu-data').value,
                id_lutador1: parseInt(document.getElementById('lu-lutador1').value),
                id_lutador2: parseInt(document.getElementById('lu-lutador2').value)
            };

            try {
                const response = await fetch(`${API_URL}/lutas/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                showMessage('msg-lutas', `✓ ${result.message}`, 'success');
                e.target.reset();
                loadLutas();
            } catch (error) {
                showMessage('msg-lutas', `✗ Erro: ${error.message}`, 'error');
            }
        }

        async function loadLutas() {
            try {
                const response = await fetch(`${API_URL}/lutas/`);
                const data = await response.json();
                const listDiv = document.getElementById('lutas-list');
                
                if (data.length === 0) {
                    listDiv.innerHTML = '<p style="color: #999;">Nenhuma luta agendada</p>';
                    return;
                }

                listDiv.innerHTML = data.map(item => `
                    <div class="list-item">
                        <div class="list-item-content">
                            <p><strong>ID:</strong> ${item.id}</p>
                            <p><strong>Data:</strong> ${item.data}</p>
                            <p><strong>Horário:</strong> ${item.horario}</p>
                            <p><strong>Lutador 1:</strong> ID ${item.id_lutador1}</p>
                            <p><strong>Lutador 2:</strong> ID ${item.id_lutador2}</p>
                        </div>
                        <div class="list-item-actions">
                            <button class="btn-small btn-delete" onclick="deleteLuta(${item.id})">Deletar</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Erro ao carregar lutas:', error);
            }
        }

        async function deleteLuta(id) {
            if (!confirm('Tem certeza que deseja cancelar esta luta?')) return;
            try {
                await fetch(`${API_URL}/lutas/${id}`, { method: 'DELETE' });
                showMessage('msg-lutas', '✓ Luta cancelada com sucesso', 'success');
                loadLutas();
            } catch (error) {
                showMessage('msg-lutas', `✗ Erro: ${error.message}`, 'error');
            }
        }

        // ===== APOSTAS =====
        async function createAposta(e) {
            e.preventDefault();
            const data = {
                valor: parseFloat(document.getElementById('ap-valor').value),
                id_luta: parseInt(document.getElementById('ap-luta').value),
                id_lutador: parseInt(document.getElementById('ap-lutador').value),
                id_apostador: parseInt(document.getElementById('ap-apostador').value)
            };

            try {
                const response = await fetch(`${API_URL}/apostas/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                showMessage('msg-apostas', `✓ ${result.message}`, 'success');
                e.target.reset();
                loadApostas();
            } catch (error) {
                showMessage('msg-apostas', `✗ Erro: ${error.message}`, 'error');
            }
        }

        async function loadApostas() {
            try {
                const response = await fetch(`${API_URL}/apostas/`);
                const data = await response.json();
                const listDiv = document.getElementById('apostas-list');
                
                if (data.length === 0) {
                    listDiv.innerHTML = '<p style="color: #999;">Nenhuma aposta realizada</p>';
                    return;
                }

                listDiv.innerHTML = data.map(item => `
                    <div class="list-item">
                        <div class="list-item-content">
                            <p><strong>ID:</strong> ${item.id}</p>
                            <p><strong>Valor:</strong> R$ ${item.valor.toFixed(2)}</p>
                            <p><strong>ID da Luta:</strong> ${item.id_luta}</p>
                            <p><strong>ID do Lutador:</strong> ${item.id_lutador}</p>
                            <p><strong>ID do Apostador:</strong> ${item.id_apostador}</p>
                        </div>
                        <div class="list-item-actions">
                            <button class="btn-small btn-delete" onclick="deleteAposta(${item.id})">Deletar</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Erro ao carregar apostas:', error);
            }
        }

        async function deleteAposta(id) {
            if (!confirm('Tem certeza que deseja remover esta aposta?')) return;
            try {
                await fetch(`${API_URL}/apostas/${id}`, { method: 'DELETE' });
                showMessage('msg-apostas', '✓ Aposta removida com sucesso', 'success');
                loadApostas();
            } catch (error) {
                showMessage('msg-apostas', `✗ Erro: ${error.message}`, 'error');
            }
        }

        // ===== STATUS =====
        async function loadStatus() {
            try {
                const response = await fetch(`${API_URL}/`);
                const data = await response.json();
                const statusDiv = document.getElementById('status-content');
                statusDiv.innerHTML = `
                    <div class="list-item">
                        <div class="list-item-content">
                            <p><strong>Status:</strong> <span class="status-badge status-online">${data.status}</span></p>
                            <p><strong>Mensagem:</strong> ${data.message}</p>
                            <p><strong>URL da API:</strong> ${API_URL}</p>
                            <p><strong>Hora do Acesso:</strong> ${new Date().toLocaleString('pt-BR')}</p>
                        </div>
                    </div>
                `;
            } catch (error) {
                const statusDiv = document.getElementById('status-content');
                statusDiv.innerHTML = `
                    <div class="list-item" style="border-left-color: #e74c3c;">
                        <div class="list-item-content">
                            <p><strong>Status:</strong> <span class="status-badge" style="background-color: #f8d7da; color: #721c24;">OFFLINE</span></p>
                            <p><strong>Erro:</strong> Não foi possível conectar à API</p>
                            <p><strong>Detalhes:</strong> ${error.message}</p>
                        </div>
                    </div>
                `;
            }
        }

        // Carrega dados ao iniciar
        window.addEventListener('load', () => {
            loadApostadores();
        });
    </script>
</body>
</html>
